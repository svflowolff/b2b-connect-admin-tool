<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Connect – Promotion Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-med: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-faint: #999;
    --green: #16a34a;
    --green-light: #f0fdf4;
    --green-text: #166534;
    --red: #dc2626;
    --red-light: #fef2f2;
    --red-text: #991b1b;
    --amber: #d97706;
    --amber-light: #fffbeb;
    --amber-text: #92400e;
    --blue-light: #eff6ff;
    --blue-text: #1e40af;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* TOPBAR */
  .topbar { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 54px; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: 0.08em; color: var(--text); }
  .logo span { color: var(--green); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-sub { font-size: 12px; color: var(--text-muted); }
  .user-input { padding: 5px 10px; font-size: 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-med); background: var(--bg); color: var(--text); width: 130px; outline: none; }
  .user-input:focus { border-color: var(--green); }

  /* TABS */
  .tabs { background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; padding: 0 24px; position: sticky; top: 54px; z-index: 9; }
  .tab { padding: 12px 16px; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.12s; display: flex; align-items: center; gap: 6px; user-select: none; }
  .tab:hover { color: var(--text); }
  .tab.act { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }
  .badge-red { font-size: 10px; padding: 1px 6px; border-radius: 20px; background: var(--red-light); color: var(--red-text); font-weight: 500; }
  .badge-green { font-size: 10px; padding: 1px 6px; border-radius: 20px; background: var(--green-light); color: var(--green-text); font-weight: 500; }

  /* CONTENT */
  .content { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
  .page { display: none; }
  .page.show { display: block; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.green { color: var(--green); }

  /* GRID */
  .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  @media (max-width: 700px) { .main-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(2, 1fr); } }

  /* PANEL */
  .panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .panel-header { padding: 12px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-size: 13px; font-weight: 500; }
  .panel-count { font-size: 11px; color: var(--text-muted); }

  /* FILTERS */
  .filters { display: flex; gap: 4px; padding: 10px 16px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
  .fb { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 0.5px solid var(--border-med); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.12s; }
  .fb.act { background: var(--green); color: #fff; border-color: var(--green); }
  .fb:hover:not(.act) { background: var(--bg); color: var(--text); }
  .search-wrap { padding: 8px 16px; border-bottom: 0.5px solid var(--border); }
  .search-input { width: 100%; padding: 6px 10px; font-size: 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-med); background: var(--bg); color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--green); }

  /* BRAND LIST */
  .brand-list { max-height: 460px; overflow-y: auto; }
  .brand-row { padding: 10px 16px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent; }
  .brand-row:last-child { border-bottom: none; }
  .brand-row:hover { background: var(--bg); }
  .brand-row.sel { background: var(--bg); }
  .brand-row.sent-row { opacity: 0.55; }
  .brand-row.p-critical { border-left-color: var(--red); }
  .brand-row.p-high { border-left-color: #f59e0b; }
  .brand-row.p-medium { border-left-color: #3b82f6; }
  .brand-row.p-low { border-left-color: var(--green); }
  .brand-row-main { flex: 1; min-width: 0; }
  .brand-row-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brand-row-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score-chip { font-size: 11px; color: var(--text-muted); background: var(--bg); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .sent-chip { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--green-light); color: var(--green-text); flex-shrink: 0; white-space: nowrap; }

  /* BADGES */
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .bc { background: var(--red-light); color: var(--red-text); }
  .bh { background: var(--amber-light); color: var(--amber-text); }
  .bm { background: var(--blue-light); color: var(--blue-text); }
  .bl { background: var(--green-light); color: var(--green-text); }

  /* EMAIL PANEL */
  .email-body { padding: 16px; }
  .empty-email { padding: 52px 16px; text-align: center; color: var(--text-faint); font-size: 13px; line-height: 1.7; }
  .empty-icon { font-size: 28px; opacity: 0.2; margin-bottom: 10px; }
  .ef { margin-bottom: 10px; }
  .el { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
  .ev { font-size: 12px; background: var(--bg); padding: 7px 10px; border-radius: var(--radius-sm); line-height: 1.5; }
  .email-text { font-size: 12px; background: var(--bg); padding: 12px 14px; border-radius: var(--radius-sm); line-height: 1.9; white-space: pre-wrap; user-select: text; min-height: 180px; max-height: 300px; overflow-y: auto; }
  .regen-btn { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 0.5px solid var(--border-med); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.12s; }
  .regen-btn:hover { background: var(--bg); color: var(--text); }

  .action-row { display: flex; gap: 8px; margin-top: 10px; }
  .copy-btn { flex: 1; padding: 8px; font-size: 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--green); background: transparent; color: var(--green); cursor: pointer; font-weight: 500; transition: background 0.12s; }
  .copy-btn:hover { background: var(--green-light); }
  .copy-btn.ok { background: var(--green-light); color: var(--green-text); }
  .sent-btn { flex: 1; padding: 8px; font-size: 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-med); background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 500; transition: all 0.12s; }
  .sent-btn:hover { background: var(--bg); }
  .sent-btn.marked { background: var(--green-light); color: var(--green-text); border-color: var(--green); }

  .sent-info { margin-top: 8px; padding: 8px 10px; background: var(--green-light); border-radius: var(--radius-sm); font-size: 11px; color: var(--green-text); }
  .brand-detail { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid var(--border); }
  .detail-name { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .detail-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .dm { font-size: 11px; color: var(--text-muted); }
  .dm strong { color: var(--text); }

  /* CAMPAIGNS */
  .warn-banner { background: var(--amber-light); border: 0.5px solid #fcd34d; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .warn-text { font-size: 12px; color: var(--amber-text); }
  .warn-text strong { color: #78350f; }
  .camp-filters { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
  .camp-list { display: flex; flex-direction: column; gap: 8px; }
  .camp-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 16px; border-left: 3px solid transparent; }
  .camp-card.c-expired { border-left-color: var(--red); }
  .camp-card.c-soon { border-left-color: #f59e0b; }
  .camp-card.c-active { border-left-color: var(--green); }
  .camp-row1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
  .camp-brand { font-size: 13px; font-weight: 500; }
  .camp-status { font-size: 10px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .cs-active { background: var(--green-light); color: var(--green-text); }
  .cs-warn { background: var(--amber-light); color: var(--amber-text); }
  .cs-expired { background: var(--red-light); color: var(--red-text); }
  .camp-title { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .camp-dates { font-size: 11px; color: var(--text-muted); }
  .camp-dates span { color: var(--text); }
  .empty-state { padding: 32px; text-align: center; font-size: 12px; color: var(--text-muted); }
</style>
</head>

<div class="topbar">

        </div>
        <div class="search-wrap">

        </div>
        <div class="brand-list" id="brand-list"></div>
      </div>
      <div class="panel" id="email-panel">
        <div class="panel-header"><span class="panel-title">E-Mail-Vorlage</span></div>
        <div class="email-body">
          <div class="empty-email"><div class="empty-icon">✉</div>Marke auswählen um<br>Vorlage zu generieren</div>
        </div>
      </div>
    </div>
  </div>

  <!-- KAMPAGNEN -->
  <div class="page" id="page-campaigns">
    <div class="warn-banner" id="warn-banner"></div>
    <div class="camp-filters" id="camp-filter-btns">
      <button class="fb act" onclick="setCF('all',this)">Alle</button>
      <button class="fb" onclick="setCF('warn',this)">Warnung</button>
      <button class="fb" onclick="setCF('active',this)">Aktiv</button>
      <button class="fb" onclick="setCF('expired',this)">Abgelaufen</button>
    </div>
    <div class="camp-list" id="camp-list"></div>
  </div>

  <!-- VERSENDET -->
  <div class="page" id="page-sent">
    <div class="section-title">Versendete E-Mails</div>
    <div class="camp-list" id="sent-list"></div>
  </div>

</div>

const VARIANTS=[
  (sal,brand,ctx)=>`${sal}\n\nwir schauen uns regelmäßig an, welche Marken auf B2B Connect noch mehr Sichtbarkeit verdienen – und ${brand} ist uns dabei aufgefallen.\n\n${ctx}. Genau deshalb melden wir uns heute: Wir würden ${brand} gerne in den Spotlight rücken – prominent platziert, direkt vor den Augen aktiver Einkäufer und Händler.\n\nWas das bringt? Marken, die wir featuren, verzeichnen messbar mehr Anfragen und neue Händlerkontakte. Das tracken wir aktiv und können es Euch schwarz auf weiß zeigen.\n\nWas wir dafür brauchen, ist eigentlich nur eines: ein Imagefilm oder Videomaterial, das ${brand} zum Leben bringt. Den Rest übernehmen wir.\n\nKlingt interessant? Dann schreibt uns einfach kurz zurück – wir machen es unkompliziert.\n\nHerzliche Grüße\nEuer B2B Connect Team`,
  (sal,brand,ctx)=>`${sal}\n\nkurze Nachricht mit einem konkreten Angebot: Wir möchten ${brand} auf B2B Connect in den Spotlight rücken.\n\nB2B Connect wird täglich von Einkäufern und Händlern genutzt, die aktiv nach neuen Marken suchen. Marken, die wir featuren, verzeichnen messbar mehr Anfragen und neue Händlerkontakte – das tracken wir aktiv und können es Euch schwarz auf weiß zeigen.\n\nWir haben ${brand} im Blick, weil ${ctx}. Jetzt wäre der richtige Moment, das zu ändern.\n\nWas wir dafür brauchen, ist eigentlich nur eines: ein Imagefilm oder Videomaterial, das ${brand} zum Leben bringt. Den Rest übernehmen wir.\n\nEinfach kurz zurückschreiben – wir melden uns schnell und klären alles unkompliziert.\n\nBis bald,\nEuer B2B Connect Team`,
  (sal,brand,ctx)=>`${sal}\n\n${brand} gehört auf die Bühne – und wir haben genau die richtige.\n\nWir haben festgestellt, dass ${ctx}. Das möchten wir gerne gemeinsam mit Euch ändern. Auf B2B Connect erreicht Ihr täglich Einkäufer und Händler, die aktiv auf der Suche sind. Marken, die bei uns featured werden, verzeichnen messbar mehr Anfragen und neue Händlerkontakte – das tracken wir aktiv und können es Euch schwarz auf weiß zeigen.\n\nWas wir dafür brauchen? Einen Imagefilm oder Videomaterial, das ${brand} zum Leben bringt. Den Rest übernehmen wir vollständig.\n\nHabt Ihr Interesse? Dann meldet Euch einfach – wir freuen uns auf den Austausch.\n\nHerzliche Grüße\nEuer B2B Connect Team`,
  (sal,brand,ctx)=>`${sal}\n\nwir haben ${brand} auf dem Radar – und möchten Euch eine Möglichkeit vorstellen, die sich für viele unserer Partner bereits messbar ausgezahlt hat.\n\nAuf B2B Connect können wir ${brand} direkt vor die Augen von Händlern und Einkäufern bringen, die täglich aktiv nach Marken suchen. Marken, die wir featuren, verzeichnen nachweislich mehr Anfragen und neue Händlerkontakte – wir tracken das aktiv und können Euch die Zahlen zeigen.\n\nDa ${ctx}, ist jetzt ein guter Zeitpunkt, gemeinsam loszulegen. Was wir brauchen: einen Imagefilm oder hochwertiges Videomaterial, das Eure Marke zum Leben bringt. Den Rest übernehmen wir.\n\nSchreibt uns einfach kurz zurück – unkompliziert und ohne großen Aufwand.\n\nBeste Grüße\nEuer B2B Connect Team`,
  (sal,brand,ctx)=>`${sal}\n\neine kurze, aber wichtige Nachricht: Wir würden ${brand} gerne auf B2B Connect featured sehen.\n\nUnser Tracking zeigt es deutlich – Marken, die bei uns in den Spotlight kommen, verzeichnen messbar mehr Anfragen und neue Händlerkontakte. Schwarz auf weiß, nachvollziehbar, real.\n\nWir haben geschaut, und ${ctx}. Das ist eine Chance, die wir nicht ungenutzt lassen wollen.\n\nAlles was wir brauchen: einen Imagefilm oder Videomaterial, das ${brand} zum Leben bringt. Den Rest – Platzierung, Timing, Umsetzung – übernehmen wir komplett.\n\nInteresse? Einfach kurz Bescheid geben.\n\nHerzliche Grüße\nEuer B2B Connect Team`,
  (sal,brand,ctx)=>`${sal}\n\nwir tracken auf B2B Connect sehr genau, welche Marken gerade Aufmerksamkeit verdienen – und ${brand} steht dabei oben auf unserer Liste.\n\nDer Grund: ${ctx}. Das wollen wir gemeinsam mit Euch ändern.\n\nFeatured Brands auf unserer Plattform landen direkt im Blickfeld aktiver Einkäufer und Händler. Und die Ergebnisse sprechen für sich: messbar mehr Anfragen, neue Händlerkontakte, nachweisbar. Wir haben die Zahlen und zeigen sie Euch gerne.\n\nWas es braucht, ist eigentlich nur eines: ein Imagefilm oder Videomaterial, das ${brand} zeigt wie es ist. Den Rest übernehmen wir.\n\nMeldet Euch einfach – wir freuen uns, loszulegen.\n\nBis bald,\nEuer B2B Connect Team`,
  (sal,brand,ctx)=>`${sal}\n\nmanchmal braucht es nur den richtigen Moment und die richtige Bühne. Für ${brand} wäre beides jetzt gegeben.\n\nWir möchten ${brand} auf B2B Connect prominent platzieren – direkt dort, wo Händler und Einkäufer täglich aktiv suchen. Was das konkret bringt: Marken, die wir featuren, verzeichnen messbar mehr Anfragen und neue Händlerkontakte. Das ist kein Bauchgefühl – wir tracken es aktiv und können Euch die Zahlen zeigen.\n\nWir haben festgestellt, dass ${ctx}. Genau deshalb melden wir uns.\n\nWas wir brauchen: einen Imagefilm oder Videomaterial, das die Persönlichkeit von ${brand} einfängt. Den Rest übernehmen wir.\n\nKlingt gut? Dann einfach kurz zurückschreiben.\n\nHerzliche Grüße\nEuer B2B Connect Team`,
  (sal,brand,ctx)=>`${sal}\n\nwir haben eine konkrete Idee für ${brand} – und die möchten wir kurz mit Euch teilen.\n\nB2B Connect verbindet Marken täglich mit Händlern und Einkäufern, die aktiv auf der Suche sind. Unsere Featured Brands profitieren messbar: mehr Anfragen, neue Händlerkontakte – und wir tracken das aktiv, können es also schwarz auf weiß belegen.\n\n${brand} haben wir dabei besonders im Blick, denn ${ctx}. Wir sehen hier echtes Potenzial, das wir gerne gemeinsam heben würden.\n\nWas wir dafür brauchen: einen Imagefilm oder Videomaterial, das Eure Marke zum Leben bringt. Den Rest – von der Platzierung bis zur Umsetzung – übernehmen wir.\n\nHabt Ihr fünf Minuten für ein kurzes Gespräch oder einfach eine Antwort per Mail? Wir freuen uns.\n\nHerzliche Grüße\nEuer B2B Connect Team`
];

function pickVariant(brand,sal,ctx){
  let i; do{i=Math.floor(Math.random()*VARIANTS.length);}while(i===lastVI&&VARIANTS.length>1);
  lastVI=i; return VARIANTS[i](sal,brand,ctx);
}

function getUsername(){ return document.getElementById('username-input').value.trim()||'Unbekannt'; }
function sk(b){ return 'b2bc_sent_'+b.replace(/[^a-zA-Z0-9]/g,'_'); }

function loadSentLog(){
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('b2bc_sent_')){
      try{ sentLog[k]=JSON.parse(localStorage.getItem(k)); }catch(e){}
    }
  }
  updateBadge(); renderBrands(); renderSent();
}
function markSent(brand){
  const k=sk(brand),e={brand,sentBy:getUsername(),sentAt:new Date().toISOString()};
  sentLog[k]=e; localStorage.setItem(k,JSON.stringify(e));
  updateBadge(); renderBrands(); renderSent();
  if(selBrand&&selBrand.brand===brand) renderEmailPanel(selBrand);
}
function unmarkSent(brand){
  const k=sk(brand); delete sentLog[k]; localStorage.removeItem(k);
  updateBadge(); renderBrands(); renderSent();
  if(selBrand&&selBrand.brand===brand) renderEmailPanel(selBrand);
}
function getSent(b){ return sentLog[sk(b)]||null; }
function updateBadge(){ document.getElementById('sent-count').textContent=Object.keys(sentLog).length; }
function fmtTs(iso){ const d=new Date(iso); return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}); }
function fmtD(d){ if(!d)return 'Nie'; return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function firstName(email){
  const loc=email.split('@')[0].toLowerCase(),parts=loc.split(/[\.\-_]/);
  let n=parts[0]; if(n.length===1&&parts.length>1)n=parts[1];
  n=n.charAt(0).toUpperCase()+n.slice(1);
  return ['info','mail','office','kontakt','contact','marketing','sales','b2b','controlling','hallo','hello','support','belladahl'].includes(n.toLowerCase())?null:n;
}
function sal(email){ const n=firstName(email); return n?`Hallo ${n},`:'Hallo zusammen,'; }
function ctx(b){
  if(!b.lastCampaign&&!b.hasVideo) return `${b.brand} noch keine Promotion auf B2B Connect hatte und noch kein Imagematerial vorliegt`;
  if(!b.lastCampaign) return `${b.brand} noch keine aktive Promotion auf B2B Connect hatte`;
  if(!b.hasVideo) return `${b.brand} zuletzt am ${fmtD(b.lastCampaign)} auf B2B Connect zu sehen war, aber noch kein Imagefilm vorliegt`;
  return `${b.brand} zuletzt am ${fmtD(b.lastCampaign)} auf B2B Connect präsent war`;
}

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('act')); el.classList.add('act');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById('page-'+t).classList.add('show');
  if(t==='sent') renderSent();
}
function setF(f,el){ curFilter=f; document.querySelectorAll('#page-brands .fb').forEach(b=>b.classList.remove('act')); el.classList.add('act'); renderBrands(); }
function setS(v){ curSearch=v.toLowerCase(); renderBrands(); }
function setCF(f,el){ curCF=f; document.querySelectorAll('#camp-filter-btns .fb').forEach(b=>b.classList.remove('act')); el.classList.add('act'); renderCampaigns(); }
function getFiltered(){ return BRANDS.filter(b=>(curFilter==='all'||b.priority===curFilter)&&(!curSearch||b.brand.toLowerCase().includes(curSearch))); }

function renderStats(){
  const c={critical:0,high:0,medium:0,low:0}; BRANDS.forEach(b=>c[b.priority]++);
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-label">Marken gesamt</div><div class="stat-value">${BRANDS.length}</div></div>
    <div class="stat-card"><div class="stat-label">Kritisch</div><div class="stat-value red">${c.critical}</div></div>
    <div class="stat-card"><div class="stat-label">Hohe Priorität</div><div class="stat-value amber">${c.high}</div></div>
    <div class="stat-card"><div class="stat-label">Versendet</div><div class="stat-value green">${Object.keys(sentLog).length}</div></div>`;
}

function renderBrands(){
  renderStats();
  const fl=getFiltered();
  document.getElementById('pcount').textContent=`${fl.length} von ${BRANDS.length}`;
  if(!fl.length){ document.getElementById('brand-list').innerHTML='<div class="empty-state">Keine Ergebnisse</div>'; return; }
  document.getElementById('brand-list').innerHTML=fl.map(b=>{
    const isSel=selBrand&&selBrand.brand===b.brand,sent=getSent(b.brand);
    const bc=b.priority==='critical'?'bc':b.priority==='high'?'bh':b.priority==='medium'?'bm':'bl';
    return `<div class="brand-row p-${b.priority}${isSel?' sel':''}${sent?' sent-row':''}" onclick='selBrand2(${JSON.stringify(b).replace(/'/g,"\\'")})'> 
      <div class="brand-row-main">
        <div class="brand-row-name">${b.brand}</div>
        <div class="brand-row-sub">${sent?'Versendet von '+sent.sentBy+' · '+fmtTs(sent.sentAt):b.email}</div>
      </div>
      <div class="score-chip">${b.score.toFixed(1)}</div>
      ${sent?'<span class="sent-chip">✓ Mail raus</span>':`<span class="badge ${bc}">${LABELS[b.priority]}</span>`}
    </div>`;
  }).join('');
}

function renderEmailPanel(b){
  const sent=getSent(b.brand),n=firstName(b.email);
  const subj=`Einladung zur Featured-Promotion auf B2B Connect – ${b.brand}`;
  const bc=b.priority==='critical'?'bc':b.priority==='high'?'bh':b.priority==='medium'?'bm':'bl';
  curEmailText=pickVariant(b.brand,sal(b.email),ctx(b));
  document.getElementById('email-panel').innerHTML=`
    <div class="panel-header">
      <span class="panel-title">E-Mail-Vorlage</span>
      <span class="badge ${bc}">${LABELS[b.priority]}</span>
    </div>
    <div class="email-body">
      <div class="brand-detail">
        <div class="detail-name">${b.brand}</div>
        <div class="detail-meta">
          <div class="dm">Score <strong>${b.score.toFixed(1)}</strong></div>
          <div class="dm">Letzte Promo <strong>${fmtD(b.lastCampaign)}</strong></div>
          <div class="dm">Imagefilm <strong>${b.hasVideo?'vorhanden':'fehlt'}</strong></div>
          <div class="dm">Ansprache <strong>${n?`"Hallo ${n}"`:'"Hallo zusammen"'}</strong></div>
        </div>
      </div>
      ${sent?`<div class="sent-info">✓ Versendet von <strong>${sent.sentBy}</strong> am ${fmtTs(sent.sentAt)}</div>`:''}
      <div class="ef"><div class="el">An</div><div class="ev">${b.email}</div></div>
      <div class="ef"><div class="el">Betreff</div><div class="ev">${subj}</div></div>
      <div class="ef">
        <div class="el"><span>Nachricht</span><button class="regen-btn" onclick="regen()">↻ Neu generieren</button></div>
        <div class="email-text" id="etxt">${curEmailText}</div>
      </div>
      <div class="action-row">
        <button class="copy-btn" id="cbtn" onclick="copyIt()">E-Mail kopieren</button>
        <button class="sent-btn${sent?' marked':''}" id="sbtn" onclick="${sent?`unmarkSent2('${b.brand.replace(/'/g,"\\'")}')` : `markSent2('${b.brand.replace(/'/g,"\\'")}')` }">${sent?'✓ Als versendet markiert':'Als versendet markieren'}</button>
      </div>
    </div>`;
}

function selBrand2(b){ selBrand=b; renderBrands(); renderEmailPanel(b); }
function markSent2(brand){ markSent(brand); }
function unmarkSent2(brand){ unmarkSent(brand); }
function regen(){
  if(!selBrand)return;
  curEmailText=pickVariant(selBrand.brand,sal(selBrand.email),ctx(selBrand));
  const el=document.getElementById('etxt'); if(el) el.textContent=curEmailText;
}
function copyIt(){
  const subj=`Einladung zur Featured-Promotion auf B2B Connect – ${selBrand.brand}`;
  navigator.clipboard.writeText(`An: ${selBrand.email}\nBetreff: ${subj}\n\n${curEmailText}`).then(()=>{
    const b=document.getElementById('cbtn'); b.textContent='Kopiert!'; b.classList.add('ok');
    setTimeout(()=>{b.textContent='E-Mail kopieren';b.classList.remove('ok');},2000);
  });
}

function renderSent(){
  const entries=Object.values(sentLog).sort((a,b)=>new Date(b.sentAt)-new Date(a.sentAt));
  if(!entries.length){ document.getElementById('sent-list').innerHTML='<div class="empty-state">Noch keine E-Mails als versendet markiert.</div>'; return; }
  document.getElementById('sent-list').innerHTML=entries.map(e=>`
    <div class="camp-card c-active">
      <div class="camp-row1"><div class="camp-brand">${e.brand}</div><span class="camp-status cs-active">✓ Versendet</span></div>
      <div class="camp-dates">Von <span>${e.sentBy}</span> &nbsp;·&nbsp; Am <span>${fmtTs(e.sentAt)}</span></div>
    </div>`).join('');
}

function renderCampaigns(){
  const entries=Object.entries(CAMPAIGNS);
  document.getElementById('warn-count').textContent=entries.filter(([,c])=>c.warn).length;
  const soonEnd=entries.filter(([,c])=>c.status==='active'&&c.warn);
  const expired=entries.filter(([,c])=>c.status==='expired');
  let parts=[];
  if(soonEnd.length) parts.push(`<strong>${soonEnd.length} aktive Kampagne</strong> läuft in ≤14 Tagen aus – keine Folgekampagne geplant`);
  if(expired.length) parts.push(`<strong>${expired.length} Marken</strong> ohne aktive oder geplante Kampagne`);
  document.getElementById('warn-banner').innerHTML=`<span style="font-size:14px">⚠</span><div class="warn-text">${parts.join(' · ')}</div>`;
  let fl=entries;
  if(curCF==='warn') fl=entries.filter(([,c])=>c.warn);
  else if(curCF==='active') fl=entries.filter(([,c])=>c.status==='active');
  else if(curCF==='expired') fl=entries.filter(([,c])=>c.status==='expired');
  fl.sort(([,a],[,b])=>{ if(a.status==='active'&&b.status!=='active')return -1; if(b.status==='active'&&a.status!=='active')return 1; return b.daysLeft-a.daysLeft; });
  document.getElementById('camp-list').innerHTML=fl.map(([brand,c])=>{
    let cc,bc,bt,di;
    if(c.status==='active'&&c.warn){cc='camp-card c-soon';bc='camp-status cs-warn';bt=`Endet in ${c.daysLeft} Tag${c.daysLeft===1?'':'en'}`;di=`Läuft bis <span>${fmtD(c.endDate)}</span>`;}
    else if(c.status==='active'){cc='camp-card c-active';bc='camp-status cs-active';bt=`Aktiv · noch ${c.daysLeft} Tage`;di=`Läuft bis <span>${fmtD(c.endDate)}</span>`;}
    else{cc='camp-card c-expired';bc='camp-status cs-expired';const ago=Math.abs(c.daysLeft);bt=`Abgelaufen · vor ${ago} Tag${ago===1?'':'en'}`;di=`Zuletzt aktiv am <span>${fmtD(c.endDate)}</span>`;}
    return `<div class="${cc}"><div class="camp-row1"><div class="camp-brand">${brand}</div><span class="${bc}">${bt}</span></div><div class="camp-title">${c.title}</div><div class="camp-dates">${di}</div></div>`;
  }).join('');
}

loadSentLog();
renderCampaigns();
</script>
</body>
</html>
