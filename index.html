<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Connect – Promotion Manager</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,0.1);--border-med:rgba(0,0,0,0.18);
  --text:#1a1a1a;--muted:#6b6b6b;--faint:#999;
  --green:#16a34a;--gl:#f0fdf4;--gt:#166534;
  --red:#dc2626;--rl:#fef2f2;--rt:#991b1b;
  --amber:#d97706;--al:#fffbeb;--at:#92400e;
  --bl:#eff6ff;--bt:#1e40af;
  --r:10px;--rs:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:10;}
.logo{font-size:15px;font-weight:600;letter-spacing:.08em;}.logo span{color:var(--green);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-sub{font-size:12px;color:var(--muted);}
.user-input{padding:5px 10px;font-size:12px;border-radius:var(--rs);border:0.5px solid var(--border-med);background:var(--bg);color:var(--text);width:130px;outline:none;}
.user-input:focus{border-color:var(--green);}
.tabs{background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;padding:0 24px;position:sticky;top:54px;z-index:9;}
.tab{padding:12px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;display:flex;align-items:center;gap:6px;user-select:none;}
.tab:hover{color:var(--text);}
.tab.act{color:var(--green);border-bottom-color:var(--green);font-weight:500;}
.br{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--rl);color:var(--rt);font-weight:500;}
.bg{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--gl);color:var(--gt);font-weight:500;}
.content{padding:20px 24px;max-width:1200px;margin:0 auto;}
.page{display:none;}.page.show{display:block;}
.stitle{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.sc{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.sl{font-size:11px;color:var(--muted);margin-bottom:4px;}
.sv{font-size:24px;font-weight:600;color:var(--text);}
.sv.red{color:var(--red);}.sv.amber{color:var(--amber);}.sv.green{color:var(--green);}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
@media(max-width:700px){.mgrid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}
.panel{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;}
.ph{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.pt{font-size:13px;font-weight:500;}.pc{font-size:11px;color:var(--muted);}
.score-legend{font-size:11px;color:var(--muted);padding:8px 16px;border-bottom:0.5px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:4px;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.filters{display:flex;gap:4px;padding:10px 16px;border-bottom:0.5px solid var(--border);flex-wrap:wrap;}
.fb{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border-med);background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;}
.fb.act{background:var(--green);color:#fff;border-color:var(--green);}
.fb:hover:not(.act){background:var(--bg);color:var(--text);}
.sw{padding:8px 16px;border-bottom:0.5px solid var(--border);}
.si{width:100%;padding:6px 10px;font-size:12px;border-radius:var(--rs);border:0.5px solid var(--border-med);background:var(--bg);color:var(--text);outline:none;}
.si:focus{border-color:var(--green);}
.blist{max-height:460px;overflow-y:auto;}
.brow{padding:10px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:10px;border-left:3px solid transparent;}
.brow:last-child{border-bottom:none;}.brow:hover{background:var(--bg);}.brow.sel{background:var(--bg);}
.brow.sent-r{opacity:.55;}
.brow.p-critical{border-left-color:var(--red);}.brow.p-high{border-left-color:#f59e0b;}
.brow.p-medium{border-left-color:#3b82f6;}.brow.p-low{border-left-color:var(--green);}
.brm{flex:1;min-width:0;}
.brn{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.brs{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chip{font-size:11px;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:4px;flex-shrink:0;font-variant-numeric:tabular-nums;}
.schip{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--gl);color:var(--gt);flex-shrink:0;white-space:nowrap;}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.bc{background:var(--rl);color:var(--rt);}.bh{background:var(--al);color:var(--at);}
.bm{background:var(--bl);color:var(--bt);}.bl2{background:var(--gl);color:var(--gt);}
.eb{padding:16px;}
.ee{padding:52px 16px;text-align:center;color:var(--faint);font-size:13px;line-height:1.7;}
.ei{font-size:28px;opacity:.2;margin-bottom:10px;}
.ef{margin-bottom:10px;}
.el{font-size:11px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;}
.ev{font-size:12px;background:var(--bg);padding:7px 10px;border-radius:var(--rs);line-height:1.5;}
.et{font-size:12px;background:var(--bg);padding:12px 14px;border-radius:var(--rs);line-height:1.9;white-space:pre-wrap;user-select:text;min-height:180px;max-height:300px;overflow-y:auto;}
.rb{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid var(--border-med);background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;}
.rb:hover{background:var(--bg);color:var(--text);}
.ar{display:flex;gap:8px;margin-top:10px;}
.cb{flex:1;padding:8px;font-size:12px;border-radius:var(--rs);border:0.5px solid var(--green);background:transparent;color:var(--green);cursor:pointer;font-weight:500;transition:background .12s;}
.cb:hover{background:var(--gl);}.cb.ok{background:var(--gl);color:var(--gt);}
.sb{flex:1;padding:8px;font-size:12px;border-radius:var(--rs);border:0.5px solid var(--border-med);background:transparent;color:var(--muted);cursor:pointer;font-weight:500;transition:all .12s;}
.sb:hover{background:var(--bg);}.sb.mk{background:var(--gl);color:var(--gt);border-color:var(--green);}
.si2{margin-top:8px;padding:8px 10px;background:var(--gl);border-radius:var(--rs);font-size:11px;color:var(--gt);}
.bd{margin-bottom:12px;padding-bottom:12px;border-bottom:0.5px solid var(--border);}
.dn{font-size:13px;font-weight:500;margin-bottom:6px;}
.dm2{display:flex;gap:12px;flex-wrap:wrap;}
.dm{font-size:11px;color:var(--muted);}.dm strong{color:var(--text);}
.wb{background:var(--al);border:0.5px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.wt{font-size:12px;color:var(--at);}.wt strong{color:#78350f;}
.cf{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.cl{display:flex;flex-direction:column;gap:8px;}
.cc{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 16px;border-left:3px solid transparent;}
.cc.ce{border-left-color:var(--red);}.cc.cs{border-left-color:#f59e0b;}.cc.ca{border-left-color:var(--green);}
.cr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px;}
.cb2{font-size:13px;font-weight:500;}
.cs2{font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.csa{background:var(--gl);color:var(--gt);}.csw{background:var(--al);color:var(--at);}.cse{background:var(--rl);color:var(--rt);}
.ct{font-size:11px;color:var(--muted);margin-bottom:3px;}
.cd{font-size:11px;color:var(--muted);}.cd span{color:var(--text);}
.es{padding:32px;text-align:center;font-size:12px;color:var(--muted);}
</style>
</head>

<div class="topbar">
  <div class="logo">B2B <span>CONNECT</span></div>
  <div class="topbar-right">
    <input class="user-input" id="uname" type="text" placeholder="Dein Name..." />
    <div class="topbar-sub">Promotion Manager</div>
  </div>
</div>

<div class="tabs">
  <div class="tab act" onclick="switchTab('brands',this)">Marken & E-Mail</div>
  <div class="tab" onclick="switchTab('campaigns',this)">Kampagnen <span class="br" id="wc">–</span></div>
  <div class="tab" onclick="switchTab('sent',this)">Versendet <span class="bg" id="sc2">0</span></div>
</div>

<div class="content">
  <div class="page show" id="page-brands">
    <div class="stitle">Übersicht</div>
    <div class="stats-row" id="stats"></div>
    <div class="stitle">Marken & E-Mail-Assistent</div>
    <div class="mgrid">
      <div class="panel">
        <div class="ph"><span class="pt">Marken nach Priorität</span><span class="pc" id="pc"></span></div>
        <div class="score-legend">
          <span style="font-weight:600;color:#1a1a1a">Score:</span>
          <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>≥5.5 Kritisch</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>4.5–5.4 Hoch</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>3.5–4.4 Mittel</div>
          <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>&lt;3.5 OK</div>
        </div>
        <div class="filters">
          <button class="fb act" onclick="setF('all',this)">Alle</button>
          <button class="fb" onclick="setF('critical',this)">Kritisch</button>
          <button class="fb" onclick="setF('high',this)">Hoch</button>
          <button class="fb" onclick="setF('medium',this)">Mittel</button>
          <button class="fb" onclick="setF('low',this)">OK</button>
        </div>
        <div class="sw"><input class="si" type="text" placeholder="Marke suchen..." oninput="setS(this.value)"/></div>
        <div class="blist" id="bl"></div>
      </div>
      <div class="panel" id="ep">
        <div class="ph"><span class="pt">E-Mail-Vorlage</span></div>
        <div class="eb"><div class="ee"><div class="ei">✉</div>Marke auswählen um<br>Vorlage zu generieren</div></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-campaigns">
    <div class="wb" id="wb"></div>
    <div class="cf" id="cfb">
      <button class="fb act" onclick="setCF('all',this)">Alle</button>
      <button class="fb" onclick="setCF('warn',this)">Warnung</button>
      <button class="fb" onclick="setCF('active',this)">Aktiv</button>
      <button class="fb" onclick="setCF('expired',this)">Abgelaufen</button>
    </div>
    <div class="cl" id="camp-list"></div>
  </div>

  <div class="page" id="page-sent">
    <div class="stitle">Versendete E-Mails</div>
    <div class="cl" id="sent-list"></div>
  </div>
</div>

const CAMPAIGNS={"super.natural":{"status":"active","endDate":"2026-04-28","daysLeft":7,"title":"Fresh Season. New Energy.","warn":true},"Alpha Industries":{"status":"expired","endDate":"2026-04-14","daysLeft":-7,"title":"SS26","warn":true},"Lieblingsstück (Nitzsche Fashion GmbH)":{"status":"expired","endDate":"2026-03-31","daysLeft":-21,"title":"Party time!","warn":true},"Authentic Style":{"status":"expired","endDate":"2026-03-12","daysLeft":-40,"title":"A/W 2026","warn":true},"bella dahl (Fashion Roomers)":{"status":"expired","endDate":"2026-02-28","daysLeft":-52,"title":"made with love 2","warn":true},"B.BELT (Bazlen GmbH)":{"status":"expired","endDate":"2026-02-25","daysLeft":-55,"title":"New Collection 2026","warn":true},"Sieber - Fabrizio":{"status":"expired","endDate":"2026-02-10","daysLeft":-70,"title":"...More than just luggage!","warn":true},"LPO":{"status":"expired","endDate":"2026-02-03","daysLeft":-77,"title":"Come see what's happening","warn":true},"Bergans International [Pre Order]":{"status":"expired","endDate":"2026-01-15","daysLeft":-96,"title":"Bergans – Embracing the winter","warn":true},"Grüezi bag [DIY]":{"status":"expired","endDate":"2025-11-17","daysLeft":-155,"title":"AW25","warn":true},"Vanzetti (Bazlen GmbH)":{"status":"expired","endDate":"2025-10-14","daysLeft":-189,"title":"Vanzetti all year","warn":true},"Andrea Conti [Esgano]":{"status":"expired","endDate":"2025-09-10","daysLeft":-223,"title":"Esgano 2025","warn":true},"Heidekönigin [DIY]":{"status":"expired","endDate":"2025-09-03","daysLeft":-230,"title":"Autumn Winter","warn":true},"Gardeur DOB":{"status":"expired","endDate":"2025-08-06","daysLeft":-258,"title":"Gardeur DOB SS2025","warn":true},"elkline [Yachticon]":{"status":"expired","endDate":"2025-07-26","daysLeft":-269,"title":"ELKLINE Summer 2025","warn":true},"Miss Goodlife":{"status":"expired","endDate":"2025-07-18","daysLeft":-277,"title":"Miss Goodlife FS 2025","warn":true},"Salt and Pepper":{"status":"expired","endDate":"2025-07-03","daysLeft":-292,"title":"Salt and Peper","warn":true},"Eagle Creek Europe Ltd. [INTL]":{"status":"expired","endDate":"2025-06-24","daysLeft":-301,"title":"Vacations 2025","warn":true},"Gardeur HAKA":{"status":"expired","endDate":"2025-04-29","daysLeft":-357,"title":"Gardeur HAKA FS25","warn":true},"Schöner Wohnen (Stoeckel & Grimmler)":{"status":"expired","endDate":"2024-12-23","daysLeft":-484,"title":"Schöner Wohnen","warn":true},"Maul Sport":{"status":"expired","endDate":"2024-12-02","daysLeft":-505,"title":"Maul Sport","warn":true},"Five Fellas":{"status":"expired","endDate":"2024-08-27","daysLeft":-602,"title":"Five Fellas","warn":true},"Mustang Belts (Bazlen GmbH)":{"status":"expired","endDate":"2024-08-11","daysLeft":-618,"title":"Mustang Belts","warn":true},"MILESTONE":{"status":"expired","endDate":"2024-06-30","daysLeft":-660,"title":"Milestone SS24","warn":true},"Gardeur G1920":{"status":"expired","endDate":"2023-12-10","daysLeft":-863,"title":"Gardeur G1920","warn":true},"Armas":{"status":"expired","endDate":"2023-10-29","daysLeft":-905,"title":"Armas Vienna","warn":true},"Monti Gürtel (ETLON Group)":{"status":"expired","endDate":"2023-08-30","daysLeft":-965,"title":"MONTI Gürtel - Brand der Woche","warn":true}};

const LABELS={critical:'Kritisch',high:'Hoch',medium:'Mittel',low:'OK'};
let cf='all',cs='',sel=null,ccf='all',log={},lvi=-1,cur='';

const V=[
  (sal,brand,days)=>`${sal}\nwir würden ${brand} gerne in den kommenden Wochen ein bisschen stärker auf B2B Connect promoten. ${daysCtx(brand,days)}.\n\nHabt ihr aktuelles Videomaterial oder Bildmaterial, das wir verwenden dürfen? Wir basteln da gern etwas draus – und nehmen auch gerne Input zu USPs, Kollektionsinhalten oder Vertriebsinfos, mit denen wir das redaktionell bestücken können. Den Rest übernehmen wir.\n\nBesten Dank und schöne Grüße\n${un()}`,
  (sal,brand,days)=>`${sal}\nkurze Frage: Hätten wir von euch aktuelles Material für ${brand}? ${daysCtx(brand,days)}.\n\nWenn ihr Videoclips, Bilder oder auch einfach ein paar Stichpunkte zu USPs und Kollektionshighlights schicken könnt, legen wir gerne eine neue Promotion auf. Die Slideshow für interessierte Händler könnten wir dabei auch gleich auf Stand bringen. Den Rest machen wir.\n\nViele Grüße\n${un()}`,
  (sal,brand,days)=>`${sal}\nwir schauen gerade, welche Marken auf B2B Connect als nächstes einen Schub vertragen könnten – und ${brand} ist dabei auf unserer Liste gelandet.\n\n${daysCtx(brand,days)}. Habt ihr aktuelles Video- oder Bildmaterial das wir nutzen dürfen? Ansonsten reichen auch Kollektionsinfos oder USPs – wir machen da was draus. Den Rest übernehmen wir komplett.\n\nSchöne Grüße\n${un()}`,
  (sal,brand,days)=>`${sal}\nwir würden gerne ${brand} wieder etwas stärker bei B2B Connect in den Vordergrund rücken. Die Jahreszeit sollte sich gut dafür eignen.\n\n${daysCtx(brand,days)}. Habt ihr da etwas Aktuelles – Videomaterial, Bilder oder auch nur ein paar Stichpunkte zu Kollektionsinhalten und USPs? Wir nehmen das gerne als Basis. Den Rest übernehmen wir.\n\nDanke und herzliche Grüße\n${un()}`,
  (sal,brand,days)=>`${sal}\nhaben wir ${brand} schon länger nicht mehr auf B2B Connect gehabt – das sollten wir mal wieder ändern.\n\n${daysCtx(brand,days)}. Wenn ihr aktuelles Videomaterial oder Bilder habt, schickt sie gerne rüber. Auch Infos zu Kollektionsschwerpunkten, Multiplikatoren oder Vertriebshilfen nehmen wir gerne entgegen – damit können wir das redaktionell gut aufbauen. Den Rest machen wir.\n\nViele Grüße\n${un()}`,
  (sal,brand,days)=>`${sal}\nwir würden ${brand} gerne in Kürze neu auf B2B Connect featuren. ${daysCtx(brand,days)}.\n\nWas brauchen wir dafür? Am liebsten aktuelles Videomaterial oder gute Bilder – notfalls reichen auch Slideshow-Inhalte oder Kollektionsinfos, aus denen wir etwas bauen können. USPs, Mindestumsätze oder andere Vertriebsinfos nehmen wir ebenfalls gerne. Den Rest übernehmen wir.\n\nBesten Dank\n${un()}`,
  (sal,brand,days)=>`${sal}\nkurze Nachricht: Wir würden ${brand} gerne als nächstes auf B2B Connect promoten. ${daysCtx(brand,days)}.\n\nHabt ihr aktuelles Material – Video, Bilder, oder einfach ein paar Kollektionsinfos und USPs? Wir basteln da gerne etwas Passendes draus und bringen auch die Händler-Slideshow bei der Gelegenheit auf Stand. Den Rest übernehmen wir komplett.\n\nSchöne Grüße\n${un()}`,
  (sal,brand,days)=>`${sal}\n${brand} sollte auf B2B Connect mal wieder sichtbarer werden – und wir würden das gerne angehen.\n\n${daysCtx(brand,days)}. Falls ihr aktuelles Videomaterial oder Bilder habt, schickt sie gerne. Auch Stichpunkte zu USPs, Kollektionsinhalten oder Vertriebsthemen helfen uns weiter – damit können wir das Ganze redaktionell gut aufbauen. Den Rest machen wir.\n\nHerzliche Grüße\n${un()}`
];

function daysCtx(brand,days){
  if(days>=9999)return`Bislang hatten wir ${brand} noch nicht auf der Plattform`;
  if(days>500)return`Die letzte Promotion liegt schon eine Weile zurück`;
  if(days>180)return`Es ist jetzt einige Monate her, seit ${brand} zuletzt bei uns zu sehen war`;
  if(days>60)return`Die letzte Kampagne ist vor ein paar Monaten ausgelaufen`;
  return`${brand} war zuletzt vor Kurzem bei uns aktiv – ein guter Moment für eine Fortsetzung`;
}

function pv(brand,sal,days){let i;do{i=Math.floor(Math.random()*V.length);}while(i===lvi&&V.length>1);lvi=i;return V[i](sal,brand,days);}
function un(){const n=document.getElementById('uname').value.trim();return n?n+'\nB2B Connect':'Euer B2B Connect Team';}
function sk(b){return 'b2bc:'+b.replace(/[^a-zA-Z0-9]/g,'_');}

function loadLog(){
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('b2bc:')){try{log[k]=JSON.parse(localStorage.getItem(k));}catch(e){}}
  }
  upBadge();rB();rSent();
}
function markS(brand){
  const k=sk(brand),e={brand,by:un(),at:new Date().toISOString()};
  log[k]=e;localStorage.setItem(k,JSON.stringify(e));
  upBadge();rB();rSent();if(sel&&sel.brand===brand)rEP(sel);
}
function unmarkS(brand){
  const k=sk(brand);delete log[k];localStorage.removeItem(k);
  upBadge();rB();rSent();if(sel&&sel.brand===brand)rEP(sel);
}
function gs(b){return log[sk(b)]||null;}
function upBadge(){document.getElementById('sc2').textContent=Object.keys(log).length;}
function fts(iso){const d=new Date(iso);return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}
function fd(d){if(!d)return'Nie';return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fn(email){
  const l=email.split('@')[0].toLowerCase(),p=l.split(/[\.\-_]/);
  let n=p[0];if(n.length===1&&p.length>1)n=p[1];
  n=n.charAt(0).toUpperCase()+n.slice(1);
  return['info','mail','office','kontakt','contact','marketing','sales','b2b','controlling','hallo','hello','support','belladahl'].includes(n.toLowerCase())?null:n;
}
function sal(email){const n=fn(email);return n?`Hallo ${n},`:'Hallo zusammen,';}

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('act'));el.classList.add('act');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById('page-'+t).classList.add('show');
  if(t==='sent')rSent();
}
function setF(f,el){cf=f;document.querySelectorAll('#page-brands .fb').forEach(b=>b.classList.remove('act'));el.classList.add('act');rB();}
function setS(v){cs=v.toLowerCase();rB();}
function setCF(f,el){ccf=f;document.querySelectorAll('#cfb .fb').forEach(b=>b.classList.remove('act'));el.classList.add('act');rC();}
function gf(){return BRANDS.filter(b=>(cf==='all'||b.priority===cf)&&(!cs||b.brand.toLowerCase().includes(cs)));}

function rStats(){
  const c={critical:0,high:0,medium:0,low:0};BRANDS.forEach(b=>c[b.priority]++);
  document.getElementById('stats').innerHTML=`
    <div class="sc"><div class="sl">Marken gesamt</div><div class="sv">${BRANDS.length}</div></div>
    <div class="sc"><div class="sl">Kritisch (≥5.5)</div><div class="sv red">${c.critical}</div></div>
    <div class="sc"><div class="sl">Hoch (4.5–5.4)</div><div class="sv amber">${c.high}</div></div>
    <div class="sc"><div class="sl">Versendet</div><div class="sv green">${Object.keys(log).length}</div></div>`;
}

function rB(){
  rStats();
  const fl=gf();
  document.getElementById('pc').textContent=`${fl.length} von ${BRANDS.length}`;
  if(!fl.length){document.getElementById('bl').innerHTML='<div class="es">Keine Ergebnisse</div>';return;}
  document.getElementById('bl').innerHTML=fl.map(b=>{
    const is=sel&&sel.brand===b.brand,s=gs(b.brand);
    const bc=b.priority==='critical'?'bc':b.priority==='high'?'bh':b.priority==='medium'?'bm':'bl2';
    return`<div class="brow p-${b.priority}${is?' sel':''}${s?' sent-r':''}" onclick='selB(${JSON.stringify(b).replace(/'/g,"\\'")})'> 
      <div class="brm"><div class="brn">${b.brand}</div><div class="brs">${s?'Versendet von '+s.by+' · '+fts(s.at):b.email}</div></div>
      <div class="chip">${b.score.toFixed(1)}</div>
      ${s?'<span class="schip">✓ Mail raus</span>':`<span class="badge ${bc}">${LABELS[b.priority]}</span>`}
    </div>`;
  }).join('');
}

function rEP(b){
  const s=gs(b.brand),n=fn(b.email);
  const subj=`${b.brand} – Promotion auf B2B Connect`;
  const bc=b.priority==='critical'?'bc':b.priority==='high'?'bh':b.priority==='medium'?'bm':'bl2';
  cur=pv(b.brand,sal(b.email),b.daysSince);
  document.getElementById('ep').innerHTML=`
    <div class="ph"><span class="pt">E-Mail-Vorlage</span><span class="badge ${bc}">${LABELS[b.priority]}</span></div>
    <div class="eb">
      <div class="bd"><div class="dn">${b.brand}</div>
        <div class="dm2">
          <div class="dm">Score <strong>${b.score.toFixed(1)}</strong></div>
          <div class="dm">Letzte Promo <strong>${fd(b.lastCampaign)}</strong></div>
          <div class="dm">Imagefilm <strong>${b.hasVideo?'vorhanden':'fehlt'}</strong></div>
          <div class="dm">Ansprache <strong>${n?`"Hallo ${n}"`:'"Hallo zusammen"'}</strong></div>
        </div>
      </div>
      ${s?`<div class="si2">✓ Versendet von <strong>${s.by}</strong> am ${fts(s.at)}</div>`:''}
      <div class="ef"><div class="el">An</div><div class="ev">${b.email}</div></div>
      <div class="ef"><div class="el">Betreff</div><div class="ev">${subj}</div></div>
      <div class="ef">
        <div class="el"><span>Nachricht</span><button class="rb" onclick="regen()">↻ Neu generieren</button></div>
        <div class="et" id="etxt">${cur}</div>
      </div>
      <div class="ar">
        <button class="cb" id="cbtn" onclick="copyIt()">E-Mail kopieren</button>
        <button class="sb${s?' mk':''}" onclick="${s?`unmarkS2('${b.brand.replace(/'/g,"\\'")}')` : `markS2('${b.brand.replace(/'/g,"\\'")}')` }">${s?'✓ Als versendet markiert':'Als versendet markieren'}</button>
      </div>
    </div>`;
}

function selB(b){sel=b;rB();rEP(b);}
function markS2(brand){markS(brand);}
function unmarkS2(brand){unmarkS(brand);}
function regen(){if(!sel)return;cur=pv(sel.brand,sal(sel.email),sel.daysSince);const e=document.getElementById('etxt');if(e)e.textContent=cur;}
function copyIt(){
  const subj=`${sel.brand} – Promotion auf B2B Connect`;
  navigator.clipboard.writeText(`An: ${sel.email}\nBetreff: ${subj}\n\n${cur}`).then(()=>{
    const b=document.getElementById('cbtn');b.textContent='Kopiert!';b.classList.add('ok');
    setTimeout(()=>{b.textContent='E-Mail kopieren';b.classList.remove('ok');},2000);
  });
}

function rSent(){
  const e=Object.values(log).sort((a,b)=>new Date(b.at)-new Date(a.at));
  if(!e.length){document.getElementById('sent-list').innerHTML='<div class="es">Noch keine E-Mails als versendet markiert.</div>';return;}
  document.getElementById('sent-list').innerHTML=e.map(e=>`
    <div class="cc ca"><div class="cr"><div class="cb2">${e.brand}</div><span class="cs2 csa">✓ Versendet</span></div>
    <div class="cd">Von <span>${e.by}</span> &nbsp;·&nbsp; Am <span>${fts(e.at)}</span></div></div>`).join('');
}

function rC(){
  const entries=Object.entries(CAMPAIGNS);
  document.getElementById('wc').textContent=entries.filter(([,c])=>c.warn).length;
  const se=entries.filter(([,c])=>c.status==='active'&&c.warn);
  const ex=entries.filter(([,c])=>c.status==='expired');
  let p=[];
  if(se.length)p.push(`<strong>${se.length} aktive Kampagne</strong> läuft in ≤14 Tagen aus – keine Folgekampagne geplant`);
  if(ex.length)p.push(`<strong>${ex.length} Marken</strong> ohne aktive oder geplante Kampagne`);
  document.getElementById('wb').innerHTML=`<span style="font-size:14px">⚠</span><div class="wt">${p.join(' · ')}</div>`;
  let fl=entries;
  if(ccf==='warn')fl=entries.filter(([,c])=>c.warn);
  else if(ccf==='active')fl=entries.filter(([,c])=>c.status==='active');
  else if(ccf==='expired')fl=entries.filter(([,c])=>c.status==='expired');
  fl.sort(([,a],[,b])=>{if(a.status==='active'&&b.status!=='active')return -1;if(b.status==='active'&&a.status!=='active')return 1;return b.daysLeft-a.daysLeft;});
  document.getElementById('camp-list').innerHTML=fl.map(([brand,c])=>{
    let cc,bc,bt,di;
    if(c.status==='active'&&c.warn){cc='cc cs';bc='cs2 csw';bt=`Endet in ${c.daysLeft} Tag${c.daysLeft===1?'':'en'}`;di=`Läuft bis <span>${fd(c.endDate)}</span>`;}
    else if(c.status==='active'){cc='cc ca';bc='cs2 csa';bt=`Aktiv · noch ${c.daysLeft} Tage`;di=`Läuft bis <span>${fd(c.endDate)}</span>`;}
    else{cc='cc ce';bc='cs2 cse';const ago=Math.abs(c.daysLeft);bt=`Abgelaufen · vor ${ago} Tag${ago===1?'':'en'}`;di=`Zuletzt aktiv am <span>${fd(c.endDate)}</span>`;}
    return`<div class="${cc}"><div class="cr"><div class="cb2">${brand}</div><span class="${bc}">${bt}</span></div><div class="ct">${c.title}</div><div class="cd">${di}</div></div>`;
  }).join('');
}

loadLog();rC();
</script>
